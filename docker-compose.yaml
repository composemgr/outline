# nginx proxy address - http://172.17.0.1:3001

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  outline:
    image: outline/outline:latest
    container_name: outline-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - outline
    ports:
      - "3001:3001"
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./volumes/data/outline:/data
      - ./volumes/config/outline:/config
    depends_on:
      - outline-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3

  outline-db:
    image: postgres:16-alpine
    container_name: outline-db
    restart: unless-stopped
    logging: *default-logging
    networks:
      - outline
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-outline}
      POSTGRES_USER: ${DB_USER_NAME:-outline}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - ./volumes/data/db/postgres/outline:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${{POSTGRES_USER}} -d $${{POSTGRES_DB}}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  outline:
    external: false
